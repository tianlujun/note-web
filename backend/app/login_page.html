<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #C53030;
      --accent-hover: #9B2C2C;
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --border: #E2E2E2;
      --error: #EF4444;
      --focus-ring: rgba(197, 48, 48, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 0;
    }

    .logo-icon svg { stroke: #fff; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      height: 40px;
      padding: 0 14px;
      font-size: 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .error-msg {
      font-size: 13px;
      color: var(--error);
      margin-top: 4px;
      min-height: 18px;
    }

    button {
      width: 100%;
      height: 40px;
      font-size: 14px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
    </div>

    <h1>Note Web</h1>
    <p class="subtitle">Enter your access token to continue</p>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <input
          type="password"
          id="token-input"
          placeholder="Bearer token"
          autofocus
          disabled
        />
      </div>
      <p class="error-msg" id="error-msg"></p>
      <button type="submit" id="submit-btn">Sign In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const input = document.getElementById('token-input');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    // Enable input once JS runs
    input.disabled = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = input.value.trim();
      if (!token) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });

        if (res.ok) {
          window.location.reload();
        } else {
          const body = await res.json().catch(() => ({}));
          errorMsg.textContent = body.detail === 'Invalid token' ? 'Invalid token' : (body.detail || 'Login failed');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch {
        errorMsg.textContent = 'Network error, try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
